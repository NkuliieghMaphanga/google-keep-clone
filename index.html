<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone</title>

    <link rel="stylesheet" href="style.css">

    <link rel="stylesheet"
    href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>

    <!-- HEADER -->

    <header class="top-nav">

        <div class="nav-left">

            <button class="menu-btn">
                <i class="fa-solid fa-bars"></i>
            </button>

            <div class="logo">
                <img src="./assets/banner/keep logo.png" alt="Google Keep Logo">
                <h2>Keep</h2>
            </div>

        </div>

        <div class="search-container">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input
                type="text"
                id="searchInput"
                placeholder="Search notes..."
            >
            

        </div>

        <div class="nav-right">

            <button id="themeToggle" title="Dark Mode">
                <i class="fa-solid fa-moon"></i>
            </button>
            
             <button>
                <img src="./assets/banner/reset.svg" alt="Reset">
            </button>

            <button>
                <img src="./assets/banner/lines.svg" alt="Lines">
            </button>

            <button>
                <img src="./assets/banner/setting.svg" alt="Settings">
            </button>
 
            <button>
                <img src="./assets/banner/dot.svg" alt="More Options">
            </button>

             

           

            <div class="avatar">
                <img src="./assets/banner/ChatGPT Image Jul 4, 2026, 02_27_57 PM.png" alt="User Avatar">
            </div>

        </div>

    </header>

    <!-- MAIN LAYOUT -->

    <div class="app-container">

        <!-- SIDEBAR -->

        <aside class="sidebar">
            <button class="sidebar-link active" data-view="notes">
                <img src="./assets/banner/lightbulb.svg" alt="Notes Icon">
                <span>Notes</span>
            </button>

            <button class="sidebar-link" data-view="reminders">
                <img src="./assets/banner/reminder.svg" alt="Reminders Icon">
                <span>Reminders</span>
            </button>
            
            <button class="sidebar-link" data-view="edit">
                <img src="./assets/banner/edit.svg" alt="Edit Icon">
                <span>Edit</span>
            </button>

            <button class="sidebar-link" data-view="archive">

                <i class="fa-solid fa-box-archive"></i>

                <span>Archive</span>

            </button>

            <button class="sidebar-link" data-view="bin">

                <i class="fa-regular fa-trash-can"></i>

                <span>Bin</span>

            </button>

            

        </aside>

        <!-- CONTENT -->

        <main class="content">

            <!-- CREATE NOTE -->

            <div class="note-creator">

                <input
                    type="text" id="noteTitle" placeholder="Title">

                <textarea id="noteText" placeholder="Take a note..."maxlength="500"
                ></textarea>

                <div class="creator-footer">

                    <div class="creator-tools">

                        <input
                            type="color"
                            id="noteColor"
                            value="#fff8b8"
                            title="Choose Note Color"
                        >

                        <span id="charCount">
                            0 / 500
                        </span>

                    </div>

                    <button id="addNoteBtn">
                        Create Note
                    </button>

                </div>

            </div>

            <!-- NOTES SECTION -->

            <section id="notesView">

                <h2 class="section-heading">
                    Notes
                </h2>

                <div id="notesContainer" class="notes-grid">

                </div>

            </section>

            <!-- ARCHIVE SECTION -->

            <section id="archiveView" class="hidden">

                <h2 class="section-heading">
                    Archive
                </h2>

                <div id="archiveContainer" class="notes-grid">

                </div>

            </section>

            <!-- BIN SECTION -->

            <section id="binView" class="hidden">

                <h2 class="section-heading">
                    Bin
                </h2>

                <div id="binContainer" class="notes-grid">

                </div>

            </section>

        </main>

    </div>

    <!-- EDIT NOTE MODAL -->

    <div id="editModal" class="modal">

        <div class="modal-content">

            <span id="closeModal">
                &times;
            </span>

            <h2>Edit Note</h2>

            <input
                type="text"
                id="editTitle"
                placeholder="Title"
            >

            <textarea
                id="editText"
                placeholder="Edit your note..."
            ></textarea>

            <input
                type="color"
                id="editColor"
            >

            <button id="updateNoteBtn">
                Update Note
            </button>

        </div>

    </div>

    <!-- DELETE CONFIRMATION -->

    <div id="deleteModal" class="modal">

        <div class="modal-content small-modal">

            <h3>Delete Note?</h3>

            <p>
                This action cannot be undone.
            </p>

            <div class="modal-actions">

                <button id="confirmDelete">
                    Delete
                </button>

                <button id="cancelDelete">
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- TOAST -->

    <div id="toast">

    </div>
    <script src="script.js"></script>

</body>
</html>
