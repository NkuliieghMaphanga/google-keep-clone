<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Keep Clone | Nonkululeko Maphanga</title>

    <link rel="stylesheet" href="style.css">

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"
    >
</head>
<body>

    <!-- Header -->

    <header class="header">

        <div class="logo">
            <i class="fa-solid fa-note-sticky"></i>
            <h1>Google Keep Clone</h1>
        </div>

        <div class="header-controls">

            <input
                type="text"
                id="searchInput"
                placeholder="Search notes..."
            >

            <button
                id="themeToggle"
                title="Toggle Dark Mode"
            >
                🌙
            </button>

        </div>

    </header>

    <!-- Main -->

    <main>

        <!-- Create Note Button -->

        <div class="create-section">

            <button
                id="openModalBtn"
                title="Create a new note"
            >
                <i class="fa-solid fa-plus"></i>
                Create Note
            </button>

        </div>

        <!-- Active Notes -->

        <section>

            <div class="section-title">
                <h2>My Notes</h2>
                <span id="notesCount">0 Notes</span>
            </div>

            <div id="notesContainer">

                <div class="empty-state">
                    <i class="fa-regular fa-note-sticky"></i>
                    <h3>No Notes Yet</h3>
                    <p>Create your first note.</p>
                </div>

            </div>

        </section>

        <!-- Archived Notes -->

        <section>

            <div class="section-title">
                <h2>Archived Notes</h2>
                <span id="archiveCount">0 Notes</span>
            </div>

            <div id="archiveContainer">

                <div class="empty-state">
                    <i class="fa-solid fa-box-archive"></i>
                    <h3>No Archived Notes</h3>
                    <p>Archived notes will appear here.</p>
                </div>

            </div>

        </section>

    </main>

    <!-- Create/Edit Note Modal -->

    <div id="noteModal" class="modal">

        <div class="modal-content">

            <span id="closeModal" class="close-btn">
                &times;
            </span>

            <h2 id="modalTitle">
                Create Note
            </h2>

            <form id="noteForm">

                <input
                    type="text"
                    id="noteTitle"
                    placeholder="Note Title"
                    maxlength="50"
                    required
                >

                <textarea
                    id="noteText"
                    placeholder="Write your note here..."
                    maxlength="500"
                    required
                ></textarea>

                <div class="character-counter">
                    <span id="charCount">
                        0 / 500
                    </span>
                </div>

                <div class="color-picker-section">

                    <label for="noteColor">
                        Note Color:
                    </label>

                    <input
                        type="color"
                        id="noteColor"
                        value="#fff8b8"
                    >

                </div>

                <button
                    type="submit"
                    id="saveNoteBtn"
                >
                    Save Note
                </button>

            </form>

        </div>

    </div>

    <!-- Delete Confirmation Modal -->

    <div id="deleteModal" class="modal">

        <div class="delete-modal-content">

            <h2>Delete Note?</h2>

            <p>
                This action cannot be undone.
            </p>

            <div class="delete-actions">

                <button
                    id="confirmDelete"
                    class="delete-btn"
                >
                    Delete
                </button>

                <button
                    id="cancelDelete"
                    class="cancel-btn"
                >
                    Cancel
                </button>

            </div>

        </div>

    </div>

    <!-- Toast Notification -->

    <div id="toast">
        Success Message
    </div>

    <!-- Footer -->

    <footer>

        <p>
            Built by Nonkululeko Mphoentle Maphanga
        </p>

    </footer>

    <script src="script.js"></script>

</body>
</html>
